# ── Service (Clus terIP — interno) ─────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: mysql-service
  namespace: plataformacadastro
spec:
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306
  clusterIP: None      # Headless para acesso direto ao pod único