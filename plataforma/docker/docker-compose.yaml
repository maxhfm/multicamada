version: '3.8'

services:

  mysql-service:
    image: mysql:8.0
    container_name: mysql-service
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: appdb
      MYSQL_USER: appuser
      MYSQL_PASSWORD: changeme
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-service:
    image: maxhenrique/backend:latest
    container_name: backend-service
    depends_on:
      mysql-service:
        condition: service_healthy
    environment:
      DB_HOST: mysql-service
      DB_NAME: appdb
      DB_USER: appuser
      DB_PASSWORD: changeme
      ConnectionStrings__Default: Server=mysql-service;Port=3306;Database=appdb;User=appuser;Password=changeme;
    ports:
      - "8080:8080"

  frontend:
    image: maxhenrique/frontend:dockercompose
    container_name: frontend
    depends_on:
      - backend-service
    ports:
      - "8081:80"

volumes:
  mysql_data: