# ── Secret — credenciais do banco ─────────────────────────────────────────────
# Os valores abaixo são exemplos em base64.
# Gere com:  echo -n 'seu_valor' | base64
apiVersion: v1
kind: Secret
metadata:
  name: mysql-secret
  namespace: minha-aplicacao
type: Opaque
data:
  root-password: cm9vdHBhc3M=       # rootpass
  db-password:   Y2hhbmdlbWU=       # changeme

---
# ── ConfigMap — configurações não-sensíveis ────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: minha-aplicacao
data:
  DB_HOST: "mysql-service"
  DB_NAME: "appdb"
  DB_USER: "appuser"
