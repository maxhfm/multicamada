<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aplicação Trabalho POS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      font-family: 'Courier New', monospace;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2e2e2e;
      border-radius: 8px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }

    h1 {
      color: #f0f0f0;
      font-size: 1.1rem;
      font-weight: normal;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 32px;
      border-bottom: 1px solid #2e2e2e;
      padding-bottom: 16px;
    }

    label {
      display: block;
      color: #888;
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      background: #111;
      border: 1px solid #333;
      border-radius: 4px;
      color: #f0f0f0;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 20px;
    }

    input[type="text"]:focus { border-color: #6ee7b7; }

    button {
      width: 100%;
      padding: 12px;
      background: #6ee7b7;
      color: #0f0f0f;
      border: none;
      border-radius: 4px;
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: bold;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #34d399; }
    button:disabled { background: #2e2e2e; color: #555; cursor: not-allowed; }

    #msg {
      margin-top: 16px;
      font-size: 0.78rem;
      letter-spacing: 0.05em;
      min-height: 20px;
      text-align: center;
    }
    #msg.ok  { color: #6ee7b7; }
    #msg.err { color: #f87171; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Registrar Entrada</h1>
    <label for="mensagem">Mensagem</label>
    <input type="text" id="mensagem" autocomplete="off" />
    <button id="btn" onclick="enviar()">Enviar</button>
    <div id="msg"></div>
  </div>

  <script>
    async function enviar() {
      const input = document.getElementById('mensagem');
      const btn   = document.getElementById('btn');
      const msg   = document.getElementById('msg');
      const valor = input.value.trim();

      if (!valor) { mostrar('Campo obrigatório.', 'err'); return; }

      btn.disabled = true;
      mostrar('Enviando...', '');

      try {
        const res = await fetch('/api/entrada', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ mensagem: valor })
        });

        if (res.ok) {
          mostrar('Gravado com sucesso!', 'ok');
          input.value = '';
        } else {
          const err = await res.text();
          mostrar('Erro: ' + err, 'err');
        }
      } catch (e) {
        mostrar('Falha na conexão.', 'err');
      } finally {
        btn.disabled = false;
      }
    }

    function mostrar(texto, classe) {
      const el = document.getElementById('msg');
      el.textContent = texto;
      el.className = classe;
    }

    document.getElementById('mensagem')
      .addEventListener('keydown', e => { if (e.key === 'Enter') enviar(); });
  </script>
</body>
</html>
